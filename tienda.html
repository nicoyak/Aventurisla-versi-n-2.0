<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiendita | Aventurisla</title>
    <meta property="og:title" content="Tiendita Aventurisla">
    <meta property="og:description" content="Descubrí nuestros productos y juegos educativos sobre el humedal.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <img src="isotipo.aventurisla.jpg" alt="Isotipo Aventurisla" class="isotipo">
            <span class="brand-name">Aventurisla</span>
        </a>
        <button class="menu-toggle" id="btn-menu">☰</button>
        <nav id="menu-navegacion">
            <a href="index.html">Inicio</a>
            <a href="tienda.html" class="activo">Tiendita</a>
            <a href="excursiones.html">Excursiones</a>
        </nav>
    </header>

    <div class="container">
        <div class="breadcrumbs">
            <a href="index.html">Inicio</a> &gt; <span>Tiendita</span>
        </div>

        <h1 class="titulo-principal">Tiendita Aventurisla</h1>

        <div class="controles-tienda">
            <input type="text" id="shop-search" placeholder="Buscar un producto... (ej: serrana)">
            
            <div class="filtros-categoria" id="filtros">
                <button class="btn-filtro activo" data-cat="todas">Todas</button>
                <button class="btn-filtro" data-cat="juegos">Juegos</button>
                <button class="btn-filtro" data-cat="stickers">Stickers</button>
                <button class="btn-filtro" data-cat="postales">Postales</button>
                <button class="btn-filtro" data-cat="infografias">Infografías</button>
                <button class="btn-filtro" data-cat="libros">Libros</button>
                <button class="btn-filtro" data-cat="remeras">Remeras</button>
            </div>
        </div>

        <div id="loader" class="loader"></div>

        <div class="grid-tienda" id="product-grid" style="display: none;">
            </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>© 2026 Aventurisla - Todos los derechos reservados.</p>
            <div class="social-links">
                <a href="https://wa.me/5493412179557" target="_blank">WhatsApp</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </footer>

    <script>
        const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSheUwZ7KYvoxC8VEw3as8yU4s8csUiCAlN8hyToTCPSBnWpVOi1RS_7jcGV_4DVtDCTQCYpRzLOXUi/pub?output=csv";

        document.getElementById('btn-menu').addEventListener('click', function() {
            document.getElementById('menu-navegacion').classList.toggle('activo');
        });

        const grid = document.getElementById('product-grid');
        const loader = document.getElementById('loader');
        let productosDB = [];

        function parsearCSV(texto) {
            const lineas = texto.split('\n');
            const headers = lineas[0].split(',');
            const resultado = [];

            for (let i = 1; i < lineas.length; i++) {
                if (!lineas[i].trim()) continue;
                const valores = lineas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                headers.forEach((header, index) => {
                    let valor = valores[index] || '';
                    valor = valor.replace(/^"|"$/g, '').trim(); 
                    obj[header.trim()] = valor;
                });
                resultado.push(obj);
            }
            return resultado;
        }

        function renderizarProductos(productos) {
            grid.innerHTML = ''; 
            if (productos.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1 / -1;">No se encontraron productos en esta categoría.</p>';
                return;
            }

            productos.forEach(prod => {
                // Selecciona solo la primera imagen antes de la coma
                const primeraImagen = prod.img.split(',')[0].trim();

                const card = document.createElement('div');
                card.className = 'producto-card';
                card.innerHTML = `
                    <a href="producto.html?id=${prod.id}" class="enlace-producto">
                        <div class="img-container">
                            <img src="${primeraImagen}" alt="${prod.nombre}">
                        </div>
                        <h3>${prod.nombre}</h3>
                    </a>
                    <p class="descripcion-corta">${prod.descCorta}</p>
                    <div class="precio">${prod.precio}</div>
                `;
                grid.appendChild(card);
            });
        }

        fetch(urlCSV)
            .then(respuesta => respuesta.text())
            .then(texto => {
                productosDB = parsearCSV(texto);
                loader.style.display = 'none';
                grid.style.display = 'grid';
                renderizarProductos(productosDB);
            })
            .catch(error => {
                console.error("Error al cargar los datos:", error);
                loader.innerHTML = '<p style="color:red; text-align:center; width:100%;">Error al cargar los productos. Por favor, recargá la página.</p>';
            });

        document.getElementById('shop-search').addEventListener('input', function(e) {
            const texto = e.target.value.toLowerCase();
            const categoriaActiva = document.querySelector('.btn-filtro.activo').dataset.cat;
            
            const filtrados = productosDB.filter(prod => {
                const coincideTexto = prod.nombre.toLowerCase().includes(texto) || prod.descCorta.toLowerCase().includes(texto);
                const coincideCat = categoriaActiva === 'todas' || prod.categoria === categoriaActiva;
                return coincideTexto && coincideCat;
            });
            renderizarProductos(filtrados);
        });

        const botonesFiltro = document.querySelectorAll('.btn-filtro');
        botonesFiltro.forEach(btn => {
            btn.addEventListener('click', function() {
                botonesFiltro.forEach(b => b.classList.remove('activo'));
                this.classList.add('activo');

                const categoria = this.dataset.cat;
                const textoBusqueda = document.getElementById('shop-search').value.toLowerCase();

                const filtrados = productosDB.filter(prod => {
                    const coincideCat = categoria === 'todas' || prod.categoria === categoria;
                    const coincideTexto = prod.nombre.toLowerCase().includes(textoBusqueda);
                    return coincideCat && coincideTexto;
                });
                renderizarProductos(filtrados);
            });
        });
    </script>
</body>
</html>
