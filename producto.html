<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | Aventurisla</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <img src="isotipo.aventurisla.jpg" alt="Isotipo Aventurisla" class="isotipo">
            <span class="brand-name">Aventurisla</span>
        </a>
        <button class="menu-toggle" id="btn-menu">☰</button>
        <nav id="menu-navegacion">
            <a href="index.html">Inicio</a>
            <a href="tienda.html" class="activo">Tiendita</a>
            <a href="excursiones.html">Excursiones</a>
        </nav>
    </header>

    <div class="container">
        <div class="breadcrumbs">
            <a href="index.html">Inicio</a> &gt; <a href="tienda.html">Tiendita</a> &gt; <span id="bread-nombre">Cargando...</span>
        </div>

        <div id="loader" class="loader"></div>

        <div id="producto-contenido" style="display: none; background: white; padding: 2rem; border-radius: 15px; box-shadow: var(--sombra-suave); display: flex; flex-wrap: wrap; gap: 2rem; align-items: flex-start;">
            
            <div style="flex: 1; min-width: 300px;">
                <div class="img-container" style="height: 400px;">
                    <img id="prod-img" src="" alt="Imagen del producto">
                </div>
            </div>

            <div style="flex: 1; min-width: 300px;">
                <h1 id="prod-nombre" style="color: var(--color-primario-verde); font-size: 2.5rem; margin-bottom: 1rem;">Nombre</h1>
                <div id="prod-precio" class="precio" style="font-size: 2rem;">$0</div>
                
                <div id="prod-desc" style="margin: 1.5rem 0; font-size: 1.1rem;">
                    </div>

                <a id="prod-whatsapp" href="#" class="btn-whatsapp" target="_blank" style="margin-top: 2rem;">📲 Quiero comprar (Consultar por WhatsApp)</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>© 2026 Aventurisla - Todos los derechos reservados.</p>
            <div class="social-links">
                <a href="https://wa.me/5493412179557" target="_blank">WhatsApp</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </footer>

    <script>
        // Enlace adaptado a formato CSV
        const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSheUwZ7KYvoxC8VEw3as8yU4s8csUiCAlN8hyToTCPSBnWpVOi1RS_7jcGV_4DVtDCTQCYpRzLOXUi/pub?output=csv";

        document.getElementById('btn-menu').addEventListener('click', function() {
            document.getElementById('menu-navegacion').classList.toggle('activo');
        });

        function parsearCSV(texto) {
            const lineas = texto.split('\n');
            const headers = lineas[0].split(',');
            const resultado = [];

            for (let i = 1; i < lineas.length; i++) {
                if (!lineas[i].trim()) continue;
                const valores = lineas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                headers.forEach((header, index) => {
                    let valor = valores[index] || '';
                    valor = valor.replace(/^"|"$/g, '').trim();
                    obj[header.trim()] = valor;
                });
                resultado.push(obj);
            }
            return resultado;
        }

        const parametrosURL = new URLSearchParams(window.location.search);
        const idBuscado = parametrosURL.get('id');

        const loader = document.getElementById('loader');
        const contenido = document.getElementById('producto-contenido');

        fetch(urlCSV)
            .then(respuesta => respuesta.text())
            .then(texto => {
                const productosDB = parsearCSV(texto);
                
                const producto = productosDB.find(p => p.id === idBuscado);
                loader.style.display = 'none';

                if (producto) {
                    document.title = producto.nombre + " | Aventurisla";
                    document.getElementById('bread-nombre').innerText = producto.nombre;
                    document.getElementById('prod-img').src = producto.img;
                    document.getElementById('prod-nombre').innerText = producto.nombre;
                    document.getElementById('prod-precio').innerText = producto.precio;
                    document.getElementById('prod-desc').innerHTML = producto.descLarga;
                    
                    const mensaje = encodeURIComponent('Buenas! Quiero consultar por ' + producto.nombre);
                    document.getElementById('prod-whatsapp').href = `https://wa.me/5493412179557?text=${mensaje}`;
                    
                    contenido.style.display = 'flex';
                } else {
                    contenido.innerHTML = '<h2 style="color:red; text-align:center; width:100%;">Producto no encontrado :(</h2>';
                    contenido.style.display = 'block';
                }
            })
            .catch(error => {
                console.error("Error al cargar los datos:", error);
                loader.innerHTML = '<p style="color:red; text-align:center; width:100%;">Error de conexión. Por favor, recargá la página.</p>';
            });
    </script>
</body>
</html>
